{% extends "base.html" %}
{% block title %}{{ "Edit Transaction" if txn else "New Transaction" }}{% endblock %}
{% block content %}
<h1>{{ "Edit Transaction" if txn else "New Transaction" }}</h1>

{% if errors %}
<div class="errors">{% for e in errors %}<div>{{ e }}</div>{% endfor %}</div>
{% endif %}

<form method="post" action="{{ '/financial/transactions/' + txn.id|string + '/edit' if txn else '/financial/transactions' }}">
    <fieldset>
        <legend>Transaction</legend>
        <div class="form-row">
            <div>
                <label for="date">Date *</label>
                <input type="date" id="date" name="date" required
                       value="{{ txn.date|string if txn else '' }}">
            </div>
            <div>
                <label for="type">Type *</label>
                <select id="type" name="type" onchange="updateCategories(this.value)">
                    <option value="Income" {% if txn and txn.type == 'Income' %}selected{% endif %}>Income</option>
                    <option value="Expense" {% if txn and txn.type == 'Expense' %}selected{% endif %}>Expense</option>
                </select>
            </div>
            <div>
                <label for="amount">Amount ($) *</label>
                <input type="text" id="amount" name="amount" required placeholder="0.00"
                       value="{{ txn.amount if txn else '' }}">
            </div>
        </div>
        <div class="form-row">
            <div>
                <label for="category">Category *</label>
                <select id="category" name="category">
                    <optgroup label="Income" id="income-cats">
                        {% for c in income_categories %}
                        <option value="{{ c }}" {% if txn and txn.category == c %}selected{% endif %}>{{ c }}</option>
                        {% endfor %}
                    </optgroup>
                    <optgroup label="Expense" id="expense-cats">
                        {% for c in expense_categories %}
                        <option value="{{ c }}" {% if txn and txn.category == c %}selected{% endif %}>{{ c }}</option>
                        {% endfor %}
                    </optgroup>
                </select>
            </div>
            <div>
                <label for="reference">Reference #</label>
                <input type="text" id="reference" name="reference" placeholder="Check #, receipt #…"
                       value="{{ txn.reference if txn else '' }}">
            </div>
        </div>
        <div class="form-row">
            <div style="flex:2">
                <label for="description">Description</label>
                <input type="text" id="description" name="description"
                       value="{{ txn.description if txn else '' }}">
            </div>
            <div>
                <label for="member_id">Member (if applicable)</label>
                <select id="member_id" name="member_id">
                    <option value="">— None —</option>
                    {% for m in members %}
                    <option value="{{ m.id }}" {% if txn and txn.member_id == m.id %}selected{% endif %}>
                        {{ m.last_name }}, {{ m.first_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </fieldset>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">{{ "Save" if txn else "Add Transaction" }}</button>
        <a href="/financial/transactions" class="btn btn-secondary">Cancel</a>
    </div>
</form>

<script>
function updateCategories(type) {
    const sel = document.getElementById('category');
    for (const opt of sel.options) {
        const grp = opt.parentElement.label;
        opt.hidden = (type === 'Income' && grp === 'Expense') ||
                     (type === 'Expense' && grp === 'Income');
    }
    // select first visible
    for (const opt of sel.options) { if (!opt.hidden) { sel.value = opt.value; break; } }
}
updateCategories(document.getElementById('type').value);
document.getElementById('type').addEventListener('change', e => updateCategories(e.target.value));
</script>
{% endblock %}
