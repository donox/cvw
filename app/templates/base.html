<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CVW Membership{% endblock %}</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; color: #333; }
        nav { margin-bottom: 1.5rem; }
        nav a { margin-right: 1rem; text-decoration: none; color: #0066cc; }
        nav a:hover { text-decoration: underline; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #ddd; }
        th { background: #f5f5f5; font-weight: 600; }
        tr:hover td { background: #fafafa; }
        .btn { display: inline-block; padding: 0.4rem 0.9rem; border-radius: 4px; text-decoration: none;
               font-size: 0.9rem; border: 1px solid transparent; cursor: pointer; }
        .btn-primary { background: #0066cc; color: white; }
        .btn-secondary { background: #eee; color: #333; border-color: #ccc; }
        .btn-danger { background: #cc2200; color: white; }
        .btn:hover { opacity: 0.85; }
        .errors { background: #fff0f0; border: 1px solid #ffaaaa; padding: 0.75rem 1rem;
                  border-radius: 4px; margin-bottom: 1rem; color: #cc2200; }
        label { display: block; margin-top: 0.75rem; font-weight: 500; }
        input[type=text], input[type=email] { width: 100%; max-width: 400px; padding: 0.4rem 0.6rem;
               border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; box-sizing: border-box; }
        .form-actions { margin-top: 1.25rem; display: flex; gap: 0.75rem; align-items: center; }
        h1 { margin-bottom: 1rem; }
    </style>
</head>
<body>
<nav>
    <a href="/members/">Members</a>
    <a href="/members/pdf/current">PDF List</a>
</nav>
{% block content %}{% endblock %}
</body>
</html>
