<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Central Virginia Woodturners{% endblock %}</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Georgia, 'Times New Roman', serif; margin: 0; color: #2c2010; background: #fffdf8; }

        /* ── Header / Nav ── */
        .pub-header { background: #5a3e28; color: #f5e6d3; }
        .pub-header-inner { max-width: 1100px; margin: 0 auto; padding: 1.25rem 1.5rem 0; }
        .pub-title { font-size: 1.6rem; font-weight: bold; letter-spacing: 0.01em; margin: 0; }
        .pub-tagline { font-size: 0.88rem; color: #d9c4b0; margin: 0.15rem 0 0; font-style: italic; }
        .pub-nav { background: #3d2a1a; }
        .pub-nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem;
                         display: flex; flex-wrap: wrap; gap: 0; }
        .pub-nav a { color: #f5e6d3; text-decoration: none; font-family: sans-serif;
                     font-size: 0.9rem; padding: 0.6rem 0.9rem; display: block; }
        .pub-nav a:hover, .pub-nav a.active { background: rgba(255,255,255,0.12); }

        /* ── Main content ── */
        .pub-main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 3rem; }

        /* ── Hero / next-meeting banner ── */
        .pub-hero { background: #f0e8dc; border-left: 5px solid #5a3e28;
                    border-radius: 0 6px 6px 0; padding: 1.25rem 1.5rem; margin-bottom: 2rem; }
        .pub-hero h2 { margin: 0 0 0.25rem; font-size: 1.1rem; color: #5a3e28;
                       text-transform: uppercase; letter-spacing: 0.06em; font-family: sans-serif;
                       font-size: 0.8rem; }
        .pub-hero .hero-title { font-size: 1.5rem; margin: 0 0 0.3rem; }
        .pub-hero .hero-meta { font-family: sans-serif; font-size: 0.9rem; color: #5a3e28; }

        /* ── Card grid ── */
        .pub-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                     gap: 1.25rem; margin: 1.5rem 0; }
        .pub-card { background: #fff; border: 1px solid #ddd; border-radius: 8px;
                    padding: 1.25rem 1.5rem; text-decoration: none; color: #2c2010;
                    transition: box-shadow 0.15s, border-color 0.15s; display: block; }
        .pub-card:hover { box-shadow: 0 4px 16px rgba(90,62,40,0.14); border-color: #5a3e28; }
        .pub-card-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .pub-card-title { font-size: 1.05rem; font-weight: bold; margin: 0 0 0.3rem; color: #5a3e28; }
        .pub-card-desc { font-size: 0.875rem; color: #666; font-family: sans-serif; margin: 0; }

        /* ── Sections ── */
        .pub-section { margin-bottom: 2.5rem; }
        .pub-section h2 { font-size: 1.4rem; border-bottom: 2px solid #d9c4b0;
                          padding-bottom: 0.3rem; margin-bottom: 1rem; }
        .pub-section h3 { font-size: 1.1rem; margin: 1.2rem 0 0.4rem; }

        /* ── Table ── */
        table { width: 100%; border-collapse: collapse; font-family: sans-serif; font-size: 0.95rem; }
        th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #e8ddd0; }
        th { background: #f5ede3; font-weight: 600; color: #5a3e28; }
        tr:hover td { background: #fdf8f3; }

        /* ── Buttons ── */
        .pub-btn { display: inline-block; padding: 0.55rem 1.2rem; border-radius: 4px;
                   text-decoration: none; font-family: sans-serif; font-size: 0.9rem;
                   cursor: pointer; border: none; }
        .pub-btn-primary { background: #5a3e28; color: #fff; }
        .pub-btn-primary:hover { background: #3d2a1a; }
        .pub-btn-outline { background: transparent; border: 2px solid #5a3e28; color: #5a3e28; }
        .pub-btn-outline:hover { background: #5a3e28; color: #fff; }

        /* ── Footer ── */
        .pub-footer { background: #3d2a1a; color: #c4a882; font-family: sans-serif;
                      font-size: 0.85rem; text-align: center; padding: 1.5rem; margin-top: 3rem; }
        .pub-footer a { color: #d9c4b0; }

        /* ── Officers grid ── */
        .officer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 0.75rem; }
        .officer-card { background: #f9f4ef; border: 1px solid #e8ddd0; border-radius: 6px; padding: 0.75rem 1rem; }
        .officer-card .officer-title { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em;
                                        color: #5a3e28; font-family: sans-serif; margin-bottom: 0.2rem; }
        .officer-card .officer-name { font-size: 1rem; font-weight: bold; }

        /* ── Contact ── */
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        @media (max-width: 600px) { .contact-grid { grid-template-columns: 1fr; } }

        /* ── Meeting info ── */
        .meeting-info { background: #f5ede3; border-radius: 6px; padding: 1rem 1.25rem;
                        font-family: sans-serif; margin-bottom: 1rem; }
        .meeting-info dt { font-weight: 600; color: #5a3e28; font-size: 0.85rem; margin-top: 0.5rem; }
        .meeting-info dd { margin: 0.1rem 0 0; }
        dl { margin: 0; }

        /* ── Print ── */
        @media print { .pub-nav, .pub-footer, .pub-btn { display: none; } }

        /* ── Mobile ── */
        @media (max-width: 640px) {
            .pub-main { padding: 1rem; }
            .pub-header-inner { padding: 1rem; }
        }
    </style>
</head>
<body>
<header class="pub-header">
    <div class="pub-header-inner">
        <p class="pub-title">Central Virginia Woodturners</p>
        <p class="pub-tagline">A club for those who love to turn wood</p>
    </div>
</header>
<nav class="pub-nav">
    <div class="pub-nav-inner">
        <a href="/site/">Home</a>
        <a href="/site/about">About</a>
        <a href="/site/officers">Leadership</a>
        <a href="/site/calendar">Calendar</a>
        <a href="/site/next-meeting">Next Meeting</a>
        <a href="/site/skill-center">Skill Center</a>
        <a href="/site/resources">Resources</a>
        <a href="/apply">Join Us</a>
        <a href="/site/contact">Contact</a>
    </div>
</nav>
<main class="pub-main">
{% block content %}{% endblock %}
</main>
<footer class="pub-footer">
    <p>Central Virginia Woodturners &nbsp;·&nbsp; Richmond, Virginia</p>
    <p><a href="/apply">Membership Application</a> &nbsp;·&nbsp; <a href="/site/contact">Contact Us</a></p>
</footer>
</body>
</html>
