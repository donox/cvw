<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You — Central Virginia Woodturners</title>
    <style>
        body { font-family: Georgia, serif; margin: 0; padding: 0; background: #f4f1ec; color: #2c2c2c; }
        header { background: #5a3e1b; color: #fff; padding: 1.5rem 2rem; }
        header h1 { margin: 0; font-size: 1.6rem; }
        main { max-width: 600px; margin: 4rem auto; padding: 0 1rem; text-align: center; }
        .card { background: #fff; border-radius: 10px; padding: 2.5rem 2rem; border: 1px solid #d4c9b8; }
        .check { font-size: 3rem; margin-bottom: 1rem; }
        h2 { color: #5a3e1b; margin: 0 0 1rem; }
        p { line-height: 1.7; color: #444; }
    </style>
</head>
<body>
<header><h1>Central Virginia Woodturners</h1></header>
<main>
    <div class="card">
        <div class="check">&#10003;</div>
        <h2>Thank You for Your Feedback!</h2>
        {% if program %}
        <p>Your response about <strong>{{ program.subject }}</strong> has been recorded.
           Your input helps us improve our programs.</p>
        {% else %}
        <p>Your feedback has been recorded. Thank you!</p>
        {% endif %}
    </div>
</main>
</body>
</html>
