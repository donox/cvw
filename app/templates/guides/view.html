{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div style="margin-bottom:1.5rem">
    <a href="/guides/" class="btn btn-secondary">← Guides</a>
</div>
<style>
    .guide-body { max-width: 820px; line-height: 1.7; }
    .guide-body h2 { margin-top: 2rem; padding-bottom: 0.3rem; border-bottom: 1px solid #e0e0e0; }
    .guide-body h3 { margin-top: 1.5rem; color: #444; }
    .guide-body code { background: #f4f4f4; padding: 0.1rem 0.35rem; border-radius: 3px;
                       font-size: 0.88rem; font-family: monospace; }
    .guide-body pre { background: #f4f4f4; border: 1px solid #e0e0e0; border-radius: 4px;
                      padding: 1rem; overflow-x: auto; }
    .guide-body pre code { background: none; padding: 0; }
    .guide-body ul, .guide-body ol { padding-left: 1.5rem; }
    .guide-body li { margin: 0.3rem 0; }
    .guide-body a { color: #0066cc; }
    .guide-body table { margin: 1rem 0; }
    @media print { .btn { display: none; } }
</style>
<div class="guide-body">
    <h1 style="margin-bottom:1.5rem">{{ title }}</h1>
    {{ content_html | safe }}
</div>
{% endblock %}
