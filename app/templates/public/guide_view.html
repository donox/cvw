{% extends "base_public.html" %}
{% block title %}{{ title }} — Central Virginia Woodturners{% endblock %}
{% block content %}
<p style="margin-bottom:1.5rem">
    <a href="/site/guides" style="color:#5a3e28; font-family:sans-serif; font-size:0.9rem">← Guides</a>
</p>
<style>
    .guide-body { max-width: 820px; line-height: 1.7; }
    .guide-body h2 { margin-top: 2rem; padding-bottom: 0.3rem; border-bottom: 2px solid #d9c4b0; color: #5a3e28; }
    .guide-body h3 { margin-top: 1.5rem; color: #3d2a1a; }
    .guide-body code { background: #f5ede3; padding: 0.1rem 0.35rem; border-radius: 3px;
                       font-size: 0.88rem; font-family: monospace; }
    .guide-body pre { background: #f5ede3; border: 1px solid #e0cdb8; border-radius: 4px;
                      padding: 1rem; overflow-x: auto; }
    .guide-body pre code { background: none; padding: 0; }
    .guide-body ul, .guide-body ol { padding-left: 1.5rem; }
    .guide-body li { margin: 0.3rem 0; }
    .guide-body a { color: #0066cc; }
    .guide-body table { margin: 1rem 0; }
</style>
<div class="guide-body">
    <h1 style="margin-bottom:1.5rem">{{ title }}</h1>
    {{ content_html | safe }}
</div>
{% endblock %}
