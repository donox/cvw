{% extends "base.html" %}
{% block title %}Users{% endblock %}
{% block content %}
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem">
    <h1 style="margin:0">Users</h1>
    <a href="/admin/users/new" class="btn btn-primary">+ Add User</a>
</div>

<table>
    <thead>
        <tr>
            <th>Username</th>
            <th>Full Name</th>
            <th>Role</th>
            <th>Status</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for u in users %}
        <tr>
            <td>{{ u.username }}</td>
            <td>{{ u.full_name }}</td>
            <td><span class="badge badge-{{ u.role }}">{{ u.role|title }}</span></td>
            <td>
                {% if u.active %}
                <span class="badge badge-active">Active</span>
                {% else %}
                <span class="badge badge-former">Inactive</span>
                {% endif %}
            </td>
            <td><a href="/admin/users/{{ u.id }}/edit" class="btn btn-secondary">Edit</a></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
