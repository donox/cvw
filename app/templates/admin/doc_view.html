{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem">
    <h1 style="margin:0">{{ title }}</h1>
    <a href="/admin/docs" class="btn btn-secondary">← Documents</a>
</div>

<style>
    .doc-body { max-width: 820px; line-height: 1.65; }
    .doc-body h2 { margin-top: 2rem; padding-bottom: 0.3rem; border-bottom: 1px solid #e0e0e0; }
    .doc-body h3 { margin-top: 1.5rem; color: #444; }
    .doc-body table { margin: 1rem 0; }
    .doc-body code { background: #f4f4f4; padding: 0.1rem 0.35rem; border-radius: 3px;
                     font-size: 0.88rem; font-family: monospace; }
    .doc-body pre { background: #f4f4f4; border: 1px solid #e0e0e0; border-radius: 4px;
                    padding: 1rem; overflow-x: auto; }
    .doc-body pre code { background: none; padding: 0; }
    .doc-body ul, .doc-body ol { padding-left: 1.5rem; }
    .doc-body li { margin: 0.2rem 0; }
    .doc-body a { color: #0066cc; }
    @media print { .btn { display: none; } }
</style>

<div class="doc-body">
    {{ content_html | safe }}
</div>
{% endblock %}
